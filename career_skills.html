<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Placement x Skills Landscape for Batch 11</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0B0F1A;
      font-family: 'DM Sans', sans-serif;
      color: #F9FAFB;
      padding: 32px 20px 48px;
    }

    /* Header */
    .header { text-align: center; margin-bottom: 36px; }
    .title {
      display: inline-block;
      background: linear-gradient(90deg, #F6C90E, #22D3EE, #34D399, #F472B6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-family: 'DM Serif Display', serif;
      font-size: 30px;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .subtitle { color: #6B7280; font-size: 13px; }

    /* View toggle */
    .view-toggle {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
    }
    .view-btn {
      background: transparent;
      border: 1px solid #1F2937;
      color: #6B7280;
      border-radius: 8px;
      padding: 5px 14px;
      cursor: pointer;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }
    .view-btn.active {
      background: #1E293B;
      border-color: #374151;
      color: #F9FAFB;
    }

    /* Legend toggles */
    .legend-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .legend-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      background: #0F172A;
      border: 1.5px solid #1F2937;
      border-radius: 20px;
      padding: 5px 14px;
      cursor: pointer;
      color: #4B5563;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }
    .legend-btn.active {
      background: #1E293B;
    }

    /* Radar section */
    .radar-section {
      background: #111827;
      border: 1px solid #1F2937;
      border-radius: 20px;
      padding: 24px 10px 16px;
      max-width: 700px;
      margin: 0 auto 28px;
    }
    .radar-title {
      text-align: center;
      font-family: 'DM Serif Display', serif;
      color: #9CA3AF;
      font-size: 13px;
      margin-bottom: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    #radarCanvas { display: block; margin: 0 auto; }

    /* Scale legend */
    .scale-legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .scale-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #6B7280; }
    .scale-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* Tooltip */
    #tooltip {
      position: fixed;
      background: #1F2937;
      border: 1px solid #374151;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      pointer-events: none;
      display: none;
      z-index: 100;
      min-width: 160px;
    }
    .tt-skill { color: #F9FAFB; font-weight: 700; margin-bottom: 6px; }
    .tt-row { margin-bottom: 2px; }

    /* Cards */
    .cards-section {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 960px;
      margin: 0 auto;
    }
    .path-card {
      background: #111827;
      border: 1.5px solid #1F2937;
      border-radius: 16px;
      padding: 20px 22px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(.4,0,.2,1);
      min-width: 210px;
      flex: 1 1 210px;
      max-width: 260px;
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .card-emoji { font-size: 22px; }
    .card-label {
      font-family: 'DM Serif Display', serif;
      font-size: 15px;
      color: #9CA3AF;
      font-weight: 600;
      letter-spacing: 0.2px;
      transition: color 0.2s;
    }
    .skill-row { margin-bottom: 10px; }
    .skill-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .skill-name { font-size: 11.5px; color: #D1D5DB; }
    .skill-level { font-size: 10px; color: #6B7280; font-family: monospace; }
    .skill-bars { display: flex; gap: 4px; }
    .skill-bar {
      width: 28px;
      height: 8px;
      border-radius: 4px;
      background: #2D3748;
      transition: background 0.3s;
    }

    /* Footer */
    .footer { text-align: center; margin-top: 40px; color: #374151; font-size: 11px; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="header">
  <div class="title">Placement x Skills Landscape for Batch 11</div>
  <p class="subtitle">Required competencies across domains</p>
  <div class="view-toggle">
    <button class="view-btn active" data-view="both">Overview</button>
    <button class="view-btn" data-view="radar">Radar</button>
    <button class="view-btn" data-view="cards">Detail Cards</button>
  </div>
</div>

<div class="legend-row" id="legendRow"></div>

<div class="radar-section" id="radarSection">
  <div class="radar-title">Competency Radar</div>
  <canvas id="radarCanvas" width="640" height="380"></canvas>
  <div class="scale-legend">
    <div class="scale-item"><div class="scale-dot" style="background:#4B5563"></div>1 — Awareness</div>
    <div class="scale-item"><div class="scale-dot" style="background:#9CA3AF"></div>2 — Basic / Moderate</div>
    <div class="scale-item"><div class="scale-dot" style="background:#F9FAFB"></div>3 — Thorough</div>
  </div>
</div>

<div class="cards-section" id="cardsSection"></div>
<div class="footer">Bar depth: 1 bar = Awareness · 2 bars = Basic/Moderate · 3 bars = Thorough</div>

<div id="tooltip"></div>

<script>
const PATHS = {
  consultancy: {
    label: "Data Consultancy", color: "#F6C90E", emoji: "💼",
    skills: {
      "Machine Learning": 3, "Soft Skills": 3, "Python": 1, "Analytics": 1,
      "Guestimates": 2, "Deep Learning": 0, "Agentic AI / RAG": 0,
      "Regression / TS": 0, "Business Domain": 0, "Algorithms": 0,
    },
  },
  datascience: {
    label: "Data Science / IT", color: "#22D3EE", emoji: "🧠",
    skills: {
      "Machine Learning": 3, "Soft Skills": 0, "Python": 2, "Analytics": 1,
      "Guestimates": 0, "Deep Learning": 1, "Agentic AI / RAG": 1,
      "Regression / TS": 0, "Business Domain": 0, "Algorithms": 0,
    },
  },
  quant: {
    label: "Quant / Hedge Funds", color: "#34D399", emoji: "📈",
    skills: {
      "Machine Learning": 3, "Soft Skills": 0, "Python": 0, "Analytics": 0,
      "Guestimates": 0, "Deep Learning": 0, "Agentic AI / RAG": 0,
      "Regression / TS": 3, "Business Domain": 1, "Algorithms": 1,
    },
  },
  other: {
    label: "Other", color: "#F472B6", emoji: "🌐",
    skills: {
      "Machine Learning": 3, "Soft Skills": 3, "Python": 0, "Analytics": 1,
      "Guestimates": 0, "Deep Learning": 0, "Agentic AI / RAG": 0,
      "Regression / TS": 0, "Business Domain": 1, "Algorithms": 0,
    },
  },
};

const SKILL_DETAILS = {
  consultancy: [
    { name: "Machine Learning", level: 3, note: "Thorough understanding" },
    { name: "Soft Skills", level: 3, note: "Essential for client-facing roles" },
    { name: "Guestimates", level: 2, note: "Case interview proficiency" },
    { name: "Python", level: 1, note: "Basic scripting" },
    { name: "Analytics", level: 1, note: "Foundational data analysis" },
  ],
  datascience: [
    { name: "Machine Learning", level: 3, note: "Thorough understanding" },
    { name: "Python", level: 2, note: "Basic to moderate proficiency" },
    { name: "Analytics", level: 1, note: "Basic analytical skills" },
    { name: "Deep Learning", level: 1, note: "Awareness of concepts" },
    { name: "Agentic AI / RAG", level: 1, note: "Emerging tech awareness" },
  ],
  quant: [
    { name: "Machine Learning", level: 3, note: "Thorough understanding" },
    { name: "Regression / TS", level: 3, note: "Deep expertise required" },
    { name: "Business Domain", level: 1, note: "General market awareness" },
    { name: "Algorithms", level: 1, note: "Basic algorithm design" },
  ],
  other: [
    { name: "Machine Learning", level: 3, note: "Thorough understanding" },
    { name: "Soft Skills", level: 3, note: "Communication & leadership" },
    { name: "Analytics", level: 1, note: "Basic analytical skills" },
    { name: "Business Domain", level: 1, note: "General awareness" },
  ],
};

const LEVEL_LABELS = ["", "Awareness", "Basic / Moderate", "Thorough"];
const ALL_SKILLS = [
  "Machine Learning","Soft Skills","Python","Analytics",
  "Guestimates","Deep Learning","Agentic AI / RAG",
  "Regression / TS","Business Domain","Algorithms"
];

// State
let activeKeys = new Set(["consultancy","datascience","quant","other"]);
let currentView = "both";
let hoverPoint = null;

// ─── Legend Buttons ──────────────────────────────────────────
const legendRow = document.getElementById("legendRow");
Object.entries(PATHS).forEach(([key, path]) => {
  const btn = document.createElement("button");
  btn.className = "legend-btn active";
  btn.dataset.key = key;
  btn.innerHTML = `<span>${path.emoji}</span><span>${path.label}</span>`;
  btn.style.borderColor = path.color;
  btn.style.color = path.color;
  btn.addEventListener("click", () => {
    if (activeKeys.has(key) && activeKeys.size > 1) {
      activeKeys.delete(key);
      btn.classList.remove("active");
      btn.style.borderColor = "#1F2937";
      btn.style.color = "#4B5563";
    } else if (!activeKeys.has(key)) {
      activeKeys.add(key);
      btn.classList.add("active");
      btn.style.borderColor = path.color;
      btn.style.color = path.color;
    }
    drawRadar();
    renderCards();
  });
  legendRow.appendChild(btn);
});

// ─── View Buttons ────────────────────────────────────────────
document.querySelectorAll(".view-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".view-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentView = btn.dataset.view;
    applyView();
  });
});

function applyView() {
  const rs = document.getElementById("radarSection");
  const cs = document.getElementById("cardsSection");
  if (currentView === "radar") { rs.classList.remove("hidden"); cs.classList.add("hidden"); }
  else if (currentView === "cards") { rs.classList.add("hidden"); cs.classList.remove("hidden"); }
  else { rs.classList.remove("hidden"); cs.classList.remove("hidden"); }
}

// ─── Radar Chart (Canvas) ─────────────────────────────────────
const canvas = document.getElementById("radarCanvas");
const ctx = canvas.getContext("2d");

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function getPoint(cx, cy, radius, angle) {
  return {
    x: cx + radius * Math.cos(angle - Math.PI / 2),
    y: cy + radius * Math.sin(angle - Math.PI / 2),
  };
}

function drawRadar() {
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;
  const maxR = Math.min(W, H) * 0.36;
  const n = ALL_SKILLS.length;
  const angleStep = (2 * Math.PI) / n;
  const maxVal = 3;

  ctx.clearRect(0, 0, W, H);

  // Grid rings
  for (let level = 1; level <= maxVal; level++) {
    const r = (level / maxVal) * maxR;
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
      const pt = getPoint(cx, cy, r, i * angleStep);
      i === 0 ? ctx.moveTo(pt.x, pt.y) : ctx.lineTo(pt.x, pt.y);
    }
    ctx.closePath();
    ctx.strokeStyle = "#1F2937";
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Spokes
  for (let i = 0; i < n; i++) {
    const pt = getPoint(cx, cy, maxR, i * angleStep);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(pt.x, pt.y);
    ctx.strokeStyle = "#1F2937";
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Labels
  ctx.font = "11px 'DM Sans', sans-serif";
  ctx.fillStyle = "#9CA3AF";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  for (let i = 0; i < n; i++) {
    const angle = i * angleStep;
    const labelR = maxR + 26;
    const pt = getPoint(cx, cy, labelR, angle);
    const label = ALL_SKILLS[i];

    // Word-wrap long labels
    const words = label.split(" / ");
    if (words.length > 1) {
      ctx.fillText(words[0] + " /", pt.x, pt.y - 7);
      ctx.fillText(words[1], pt.x, pt.y + 7);
    } else {
      ctx.fillText(label, pt.x, pt.y);
    }
  }

  // Data paths
  Object.entries(PATHS).forEach(([key, path]) => {
    if (!activeKeys.has(key)) return;
    const points = ALL_SKILLS.map((skill, i) => {
      const val = path.skills[skill] || 0;
      const r = (val / maxVal) * maxR;
      return getPoint(cx, cy, r, i * angleStep);
    });

    // Fill
    ctx.beginPath();
    points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.closePath();
    ctx.fillStyle = `rgba(${hexToRgb(path.color)},0.12)`;
    ctx.fill();

    // Stroke
    ctx.beginPath();
    points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.closePath();
    ctx.strokeStyle = path.color;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Dots
    points.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, 2 * Math.PI);
      ctx.fillStyle = path.color;
      ctx.fill();
    });
  });
}

// ─── Tooltip on hover ─────────────────────────────────────────
const tooltip = document.getElementById("tooltip");

canvas.addEventListener("mousemove", (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const my = (e.clientY - rect.top) * (canvas.height / rect.height);

  const cx = canvas.width / 2, cy = canvas.height / 2;
  const maxR = Math.min(canvas.width, canvas.height) * 0.36;
  const n = ALL_SKILLS.length;
  const angleStep = (2 * Math.PI) / n;

  let found = null;
  for (let i = 0; i < n; i++) {
    const labelR = maxR + 26;
    const pt = getPoint(cx, cy, labelR, i * angleStep);
    const dist = Math.sqrt((mx - pt.x) ** 2 + (my - pt.y) ** 2);
    if (dist < 28) { found = i; break; }
  }

  if (found !== null) {
    const skill = ALL_SKILLS[found];
    let html = `<div class="tt-skill">${skill}</div>`;
    Object.entries(PATHS).forEach(([key, path]) => {
      if (!activeKeys.has(key)) return;
      const val = path.skills[skill];
      const label = LEVEL_LABELS[val] || "—";
      html += `<div class="tt-row" style="color:${path.color}">${path.label}: ${label}</div>`;
    });
    tooltip.innerHTML = html;
    tooltip.style.display = "block";
    tooltip.style.left = (e.clientX + 14) + "px";
    tooltip.style.top = (e.clientY - 10) + "px";
    canvas.style.cursor = "default";
  } else {
    tooltip.style.display = "none";
    canvas.style.cursor = "default";
  }
});
canvas.addEventListener("mouseleave", () => { tooltip.style.display = "none"; });

// ─── Cards ───────────────────────────────────────────────────
function renderCards() {
  const section = document.getElementById("cardsSection");
  section.innerHTML = "";

  Object.entries(PATHS).forEach(([key, path]) => {
    const isActive = activeKeys.has(key);
    const details = SKILL_DETAILS[key];

    const card = document.createElement("div");
    card.className = "path-card";
    card.style.background = isActive
      ? `linear-gradient(135deg, #1A2035 60%, ${path.color}22)`
      : "#111827";
    card.style.borderColor = isActive ? path.color : "#1F2937";
    if (isActive) card.style.boxShadow = `0 0 24px ${path.color}33`;

    let skillsHtml = details.map(skill => `
      <div class="skill-row">
        <div class="skill-meta">
          <span class="skill-name">${skill.name}</span>
          <span class="skill-level">${LEVEL_LABELS[skill.level]}</span>
        </div>
        <div class="skill-bars">
          ${[1,2,3].map(i => `
            <div class="skill-bar" style="background:${i <= skill.level ? path.color : "#2D3748"}"></div>
          `).join("")}
        </div>
      </div>
    `).join("");

    card.innerHTML = `
      <div class="card-header">
        <span class="card-emoji">${path.emoji}</span>
        <span class="card-label" style="color:${isActive ? path.color : "#9CA3AF"}">${path.label}</span>
      </div>
      ${skillsHtml}
    `;

    card.addEventListener("click", () => {
      const btn = legendRow.querySelector(`[data-key="${key}"]`);
      btn && btn.click();
    });

    section.appendChild(card);
  });
}

// ─── Responsive canvas resize ──────────────────────────────────
function resizeCanvas() {
  const section = document.getElementById("radarSection");
  const w = Math.min(section.clientWidth - 20, 640);
  canvas.style.width = w + "px";
  canvas.style.height = (w * 380 / 640) + "px";
}

// ─── Init ─────────────────────────────────────────────────────
resizeCanvas();
window.addEventListener("resize", () => { resizeCanvas(); drawRadar(); });
drawRadar();
renderCards();
applyView();
</script>
</body>
</html>
